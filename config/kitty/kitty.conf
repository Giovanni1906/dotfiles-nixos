# =============================================================================
# CONFIGURACIÓN DE PANELES MULTIVENTANA EN KITTY
# =============================================================================

# Define el diseño inicial (permite divisiones verticales y horizontales)
enabled_layouts splits, stack

# --- CREAR NUEVAS SUBVENTANAS (SPLITS) ---
# SUPER + Enter abre un panel al lado o abajo según el espacio
map ctrl+enter launch --location=vsplit --cwd=current
map ctrl+shift+enter launch --location=hsplit --cwd=current

# --- CERRAR EL PANEL ACTIVO ---
# SUPER + W cierra la subventana actual de Kitty
map ctrl+w close_window

# --- CAMBIAR DE VISTA (Mover el foco entre paneles) ---
# SUPER + Flechas para moverte entre los paneles internos de Kitty
map ctrl+left  neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up    neighboring_window up
map ctrl+down  neighboring_window down

# --- POSICIÓN DE PANELES (Mover de lugar las subventanas) ---
# SUPER + SHIFT + Flechas para arrastrar la subventana a otra posición
map ctrl+shift+left  move_window left
map ctrl+shift+right move_window right
map ctrl+shift+up    move_window up
map ctrl+shift+down  move_window down

# --- REDIMENSIONAR PANELES (Cambiar tamaño) ---
# SUPER + CTRL + Flechas para estirar o encoger los paneles de la terminal
map ctrl+alt+left  resize_window narrower 2
map ctrl+alt+right resize_window wider 2
map ctrl+alt+up    resize_window taller 2
map ctrl+alt+down  resize_window shorter 2

# --- MAXIMIZAR UN PANEL (Modo Zoom / Stack) ---
# SUPER + F para ocultar temporalmente los demás paneles y enfocarte en uno solo
map ctrl+f toggle_layout stack

# --- ESTILO VISUAL DE LOS BORDES ---
active_border_color #cba6f7
inactive_border_color #595959
