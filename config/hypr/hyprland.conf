# =============================================================================
# HYPRLAND CONFIGURATION - CLEAN & OPTIMIZED (2026)
# =============================================================================

autogenerated = 0

# --- VARIABLES PRINCIPALES ---
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# --- CONFIGURACIÓN DE ENTRADA ---
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    follow_mouse = 1
    sensitivity = 0 # -1.0 a 1.0, 0 significa sin modificación
}

# --- ARRANQUE AUTOMÁTICO (Servicios esenciales) ---
exec-once = waybar &
exec-once = mako &
# KDE Connect y demás utilidades del ecosistema
exec-once = kdeconnect-indicator &

# --- DISEÑO Y VENTANAS ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(cba6f7) rgb(89b4fa) 45deg # Degradado morado/azul Catppuccin
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# =============================================================================
# ATAJOS DE TECLADO (BINDINGS)
# =============================================================================

# --- CONTROL DE APLICACIONES Y SISTEMA ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, M, exec, hyprctl dispatch exit # Cierre de sesión limpio nativo

# --- CAPTURA DE PANTALLA MEJORADA (Grim + Slurp) ---
# Nota: agregamos "wl-copy" a la pantalla completa también para máxima comodidad
bind = , Print, exec, grim - | wl-copy && grim ~/Imágenes/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && grim -g "$(slurp)" ~/Imágenes/$(date +'%Y-%m-%d_%H-%M-%S').png

# --- CAMBIO DE VISTA (Mover el foco entre ventanas) ---
# Usando mainMod + Flechas direccionales
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- POSICIÓN DE VENTANAS (Mover ventanas dentro del layout) ---
# Usando mainMod + Shift + Flechas direccionales
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# --- CAMBIO DE PANTALLAS / WORKSPACES (mainMod + [0-9]) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- MOVER VENTANA A OTRA PANTALLA (mainMod + Shift + [0-9]) ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- SOPORTE PARA MOUSE (Mover y redimensionar arrastrando) ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
